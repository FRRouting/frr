name: Mergifyio backport

on: [issue_comment]

jobs:
  mergifyio_backport:
    if: github.repository == 'frrouting/frr'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Add backport label
        if: ${{ github.event.issue.pull_request && github.event.comment.body }}
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if printf '%s\n' "$COMMENT_BODY" | grep -qiE 'mergifyio[[:space:]]+backport'; then
            gh pr edit "${{ github.event.issue.number }}" --add-label backport
          fi
