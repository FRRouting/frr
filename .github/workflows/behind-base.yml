name: Add rebase label if the branch is > 50 commits behind

on:
  pull_request_target:
    types: [synchronize, opened, reopened]

jobs:
  behind:
    if: github.repository == 'frrouting/frr'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Use the compare API instead of checking out the PR head. pull_request_target
      # runs with base-repo privileges; fetching fork code there is blocked by
      # actions/checkout and is unsafe ("pwn request").
      - name: Set custom variables
        id: vars
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          behind_by=$(gh api \
            "repos/${REPO}/compare/${BASE_REF}...${HEAD_SHA}" \
            --jq .behind_by)
          echo "behind_by=${behind_by}" >> "$GITHUB_OUTPUT"
      - name: Add rebase label if needed
        if: ${{ steps.vars.outputs.behind_by > 50 }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --add-label rebase
