bgp route-map delay-timer 1
router bgp 65500
 bgp router-id 192.0.2.1
 no bgp ebgp-requires-policy
 neighbor 192.168.0.2 remote-as 65501
 address-family ipv4 unicast
  no neighbor 192.168.0.2 activate
 exit-address-family
 address-family ipv4 vpn
  neighbor 192.168.0.2 activate
 exit-address-family
!
router bgp 65500 vrf vrf1
 bgp router-id 192.0.2.1
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 445:1
  rt vpn both 53:1
  export vpn
  import vpn
 exit-address-family
!
router bgp 65500 vrf vrf2
 bgp router-id 192.0.2.1
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 445:2
  rt vpn both 53:2
  export vpn
  import vpn
 exit-address-family
!
router bgp 65500 vrf vrf3
 bgp router-id 192.0.2.1
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 445:3
  rt vpn both 53:3
  export vpn
  import vpn
 exit-address-family
!
router bgp 65500 vrf vrf4
 bgp router-id 192.0.2.1
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 445:4
  rt vpn both 53:4
  export vpn
  import vpn
 exit-address-family
!
router bgp 65500 vrf vrf5
 bgp router-id 192.0.2.1
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 445:5
  rt vpn both 53:5
  export vpn
  import vpn
 exit-address-family
!

interface r1-eth0
 mpls bgp forwarding
!