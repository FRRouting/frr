hostname rr
!
interface lo
 ip address 100.100.100.100/32
!
interface eth-r1
 ip address 10.0.0.100/24
!
router bgp 65000
 bgp router-id 100.100.100.100
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65000
 !
 address-family link-state
  neighbor 10.0.0.1 activate
 exit-address-family
!
ip forwarding
ipv6 forwarding
!
