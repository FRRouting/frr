hostname r3
!
interface lo
 ip address 3.3.3.3/32
 ipv6 address fc00:0:3::1/128
 ip router isis 1
 ipv6 router isis 1
 isis passive
!
interface eth-r1
 ip address 10.0.7.2/24
 ipv6 address fc00:7::2/64
 ip router isis 1
 ipv6 router isis 1
 link-params
 exit-link-params
 isis circuit-type level-2-only
 isis hello-interval 1
 isis hello-multiplier 3
 isis network point-to-point
!
interface eth-r5-1
 ip address 10.0.4.3/24
 ipv6 address fc00:4::3/64
 ip router isis 1
 ipv6 router isis 1
 link-params
 exit-link-params
 isis circuit-type level-2-only
 isis hello-interval 1
 isis hello-multiplier 3
 isis network point-to-point
!
interface eth-r5-2
 ip address 10.0.5.3/24
 ipv6 address fc00:5::3/64
 ip router isis 1
 ipv6 router isis 1
 link-params
 exit-link-params
 isis circuit-type level-2-only
 isis hello-interval 1
 isis hello-multiplier 3
 isis network point-to-point
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fcbb:bbbb:3::/48
    format usid-f3216
   !
  !
 !
!
router isis 1
 net 49.0000.0000.0000.0003.00
 is-type level-2-only
 topology ipv6-unicast
 redistribute ipv4 connected level-2
 redistribute ipv6 connected level-2
 lsp-gen-interval 1
 lsp-refresh-interval 10
 max-lsp-lifetime 350
 segment-routing srv6
  locator MAIN
  node-msd
   max-segs-left 3
   max-end-pop 3
   max-h-encaps 2
   max-end-d 5
!
ip forwarding
ipv6 forwarding
!
