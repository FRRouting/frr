!
router bgp 65002
 no bgp ebgp-requires-policy
 bgp router-id 2.2.2.2
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart
 neighbor 192.168.12.1 remote-as 65001
 neighbor 2001:db8:12::1 remote-as 65001
 neighbor 192.168.13.1 remote-as 65001
 neighbor 2001:db8:13::1 remote-as 65001
 neighbor 192.168.23.3 remote-as 65003
 neighbor 2001:db8:23::3 remote-as 65003
 neighbor 192.168.24.3 remote-as 65003
 neighbor 2001:db8:24::3 remote-as 65003
 !
 address-family ipv4 unicast
  neighbor 192.168.12.1 activate
  neighbor 192.168.13.1 activate
  neighbor 192.168.23.3 activate
  neighbor 192.168.24.3 activate
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:12::1 activate
  neighbor 2001:db8:13::1 activate
  neighbor 2001:db8:23::3 activate
  neighbor 2001:db8:24::3 activate
 exit-address-family
 !
 address-family ipv4 unreachability
  neighbor 192.168.12.1 activate
  neighbor 192.168.13.1 activate
  neighbor 192.168.23.3 activate
  neighbor 192.168.24.3 activate
 exit-address-family
 !
 address-family ipv6 unreachability
  neighbor 2001:db8:12::1 activate
  neighbor 2001:db8:13::1 activate
  neighbor 2001:db8:23::3 activate
  neighbor 2001:db8:24::3 activate
 exit-address-family
!
