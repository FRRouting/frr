!
router bgp 65003
 no bgp ebgp-requires-policy
 bgp router-id 3.3.3.3
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart
 neighbor 192.168.23.2 remote-as 65002
 neighbor 2001:db8:23::2 remote-as 65002
 neighbor 192.168.24.2 remote-as 65002
 neighbor 2001:db8:24::2 remote-as 65002
 !
 address-family ipv4 unicast
  neighbor 192.168.23.2 activate
  neighbor 192.168.24.2 activate
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:23::2 activate
  neighbor 2001:db8:24::2 activate
 exit-address-family
 !
 address-family ipv4 unreachability
  neighbor 192.168.23.2 activate
  neighbor 192.168.24.2 activate
 exit-address-family
 !
 address-family ipv6 unreachability
  neighbor 2001:db8:23::2 activate
  neighbor 2001:db8:24::2 activate
 exit-address-family
!
