!
router bgp 65001
 no bgp ebgp-requires-policy
 bgp router-id 1.1.1.1
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart
 neighbor 192.168.12.2 remote-as 65002
 neighbor 2001:db8:12::2 remote-as 65002
 neighbor 192.168.13.2 remote-as 65002
 neighbor 2001:db8:13::2 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.10.10.1/32
  neighbor 192.168.12.2 activate
  neighbor 192.168.13.2 activate
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:100::1/128
  neighbor 2001:db8:12::2 activate
  neighbor 2001:db8:13::2 activate
 exit-address-family
 !
 address-family ipv4 unreachability
  neighbor 192.168.12.2 activate
  neighbor 192.168.13.2 activate
 exit-address-family
 !
 address-family ipv6 unreachability
  neighbor 2001:db8:12::2 activate
  neighbor 2001:db8:13::2 activate
 exit-address-family
!
