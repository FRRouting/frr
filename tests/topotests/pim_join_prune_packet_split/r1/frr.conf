interface r1-eth0
 ip address 192.168.1.1/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
exit
!
interface r1-eth1
 ip address 192.168.2.1/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim passive
 ip igmp
exit
!
router ospf
 redistribute connected
exit
!
router pim
 rp 192.168.1.2
exit
