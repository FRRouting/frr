frr defaults traditional
hostname r1
log syslog informational
service integrated-vtysh-config
!
ip router-id 1.1.1.1
!
interface eth0
 ip address 192.0.2.1/24
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
 !no ip ospf dead-interval minimal hello-multiplier
 ip ospf hello-interval 1
 !ip ospf dead-timer-reset any-control
 !ip ospf dead-interval minimal hello-multiplier 5
 !ip ospf dead-interval 4
 ip ospf transmit-delay 5
 !ip ospf ctrl-max-bytes 300
 ip ospf mtu-ignore
 !ip ospf dead-interval minimal hello-multiplier 1
 ip ospf retransmit-interval 10
exit
!
router ospf
 log-adjacency-changes
 timers lsa min-arrival 2000
 write-multiplier 10
! Packet-level hello RX/TX with reasons
!debug ospf packet hello recv detail
!debug ospf packet hello send detail

! Neighbor + interface state and timers (helps when InactivityTimer fires)
!debug ospf nsm events
!debug ospf nsm timers
!debug ospf ism events
!debug ospf ism timers
 timers throttle lsa all 5000 
 timers lsa min-arrival 50
 timers throttle spf 200 800 10000
 max-metric router-lsa on-startup 60
exit
!
# In FRR vtysh:
debug ospf event
debug ospf nsm
debug ospf packet hello
!debug ospf lsa 
debug ospf packet ls-req
debug ospf packet ls-upd
debug ospf packet ls-ack
debug ospf packet ls-ack send
debug ospf lsa flooding
log file /var/log/frr/debug.log debugging
log file /tmp/r1-frr.rrg
end

