!
interface r3-eth0
 ip address 192.16.3.3/24
!
interface r3-eth1
 ip address 192.16.31.3/24
!
router bgp 65003
 timers bgp 1 10
 bgp router-id 0.0.0.3
 no bgp ebgp-requires-policy
 no bgp network import-check
 neighbor 192.16.3.1 remote-as 65001
 neighbor 192.16.31.1 remote-as 65001
 !
 address-family ipv4 unicast
  network 192.168.199.0/24
  neighbor 192.16.3.1 activate
  neighbor 192.16.31.1 activate
 exit-address-family
!
