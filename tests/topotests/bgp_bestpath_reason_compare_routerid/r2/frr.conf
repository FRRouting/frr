!
interface r2-eth0
 ip address 192.16.2.2/24
!
interface r2-eth1
 ip address 192.16.21.2/24
!
router bgp 65024
 timers bgp 1 10
 bgp router-id 0.0.0.2
 no bgp ebgp-requires-policy
 no bgp network import-check
 neighbor 192.16.2.1 remote-as 65001
 neighbor 192.16.21.1 remote-as 65001
 !
 address-family ipv4 unicast
  network 192.168.199.0/24
  neighbor 192.16.2.1 activate
  neighbor 192.16.21.1 activate
 exit-address-family
!
