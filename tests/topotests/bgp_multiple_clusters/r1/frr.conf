hostname r1
!
interface lo
 ip address 10.0.0.1/32
!
! Connection to r4
interface r1-eth0
 ip address 10.1.4.1/24
!
router ospf
 network 10.0.0.1/32 area 0
 network 10.1.4.0/24 area 0
!
router bgp 100
 bgp router-id 10.0.0.1
 no bgp network import-check
 neighbor 10.1.4.2 remote-as 100
 neighbor 10.1.4.2 update-source 10.1.4.1
 !
 address-family ipv4 unicast
  network 10.0.0.1/32
 exit-address-family
!
