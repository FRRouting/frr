hostname r5
!
interface lo
 ip address 10.0.0.5/32
!
! Connection to r6
interface r5-eth0
 ip address 10.5.6.1/24
!
! Connection to r7
interface r5-eth1
 ip address 10.5.7.1/24
!
! Connection to r8
interface r5-eth2
 ip address 10.5.8.1/24
!
! Connection to r4
interface r5-eth3
 ip address 10.4.5.2/24
!
! Connection to r9
interface r5-eth4
 ip address 10.5.9.1/24
!
router ospf
 network 10.0.0.5/32 area 0
 network 10.5.6.0/24 area 0
 network 10.5.7.0/24 area 0
 network 10.5.8.0/24 area 0
 network 10.4.5.0/24 area 0
 network 10.5.9.0/24 area 0
!
router bgp 100
 bgp router-id 10.0.0.5
 bgp cluster-id 10.0.0.5
 no bgp network import-check
 neighbor cluster3 peer-group
 neighbor cluster3 remote-as 100
 neighbor 10.5.6.2 peer-group cluster3
 neighbor 10.5.6.2 update-source 10.5.6.1
 neighbor 10.4.5.1 remote-as 100
 neighbor 10.4.5.1 update-source 10.4.5.2
 neighbor 10.5.7.2 peer-group cluster3
 neighbor 10.5.7.2 update-source 10.5.7.1
 neighbor 10.5.8.2 remote-as 100
 neighbor 10.5.8.2 update-source 10.5.8.1
 neighbor 10.5.9.2 remote-as 100
 neighbor 10.5.9.2 update-source 10.5.9.1
 !
 address-family ipv4 unicast
  neighbor cluster3 route-reflector-client
  neighbor cluster3 cluster-id 20.0.0.3
  neighbor 10.5.8.2 route-reflector-client
  neighbor 10.5.8.2 cluster-id 20.0.0.2
 exit-address-family
!
