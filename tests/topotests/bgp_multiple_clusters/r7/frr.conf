hostname r7
!
interface lo
 ip address 10.0.0.7/32
!
! Connection to r5
interface r7-eth0
 ip address 10.5.7.2/24
!
router ospf
 network 10.0.0.7/32 area 0
 network 10.5.7.0/24 area 0
!
router bgp 100
 bgp router-id 10.0.0.7
 no bgp network import-check
 neighbor 10.5.7.1 remote-as 100
 neighbor 10.5.7.1 update-source 10.5.7.2
 !
 address-family ipv4 unicast
  network 10.0.0.7/32
 exit-address-family
!
