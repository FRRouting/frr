hostname r8
!
interface lo
 ip address 10.0.0.8/32
!
! Connection to r5
interface r8-eth0
 ip address 10.5.8.2/24
!
router ospf
 network 10.0.0.8/32 area 0
 network 10.5.8.0/24 area 0
!
router bgp 100
 bgp router-id 10.0.0.8
 no bgp network import-check
 neighbor 10.5.8.1 remote-as 100
 neighbor 10.5.8.1 update-source 10.5.8.2
 !
 address-family ipv4 unicast
  network 10.0.0.8/32
 exit-address-family
!
