hostname r3
!
interface lo
 ip address 10.0.0.3/32
!
! Connection to r4
interface r3-eth0
 ip address 10.3.4.1/24
!
router ospf
 network 10.0.0.3/32 area 0
 network 10.3.4.0/24 area 0
!
router bgp 100
 bgp router-id 10.0.0.3
 no bgp network import-check
 neighbor 10.3.4.2 remote-as 100
 neighbor 10.3.4.2 update-source 10.3.4.1
 !
 address-family ipv4 unicast
  network 10.0.0.3/32
 exit-address-family
!
