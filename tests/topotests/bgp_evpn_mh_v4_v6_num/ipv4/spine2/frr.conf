frr defaults datacenter
service integrated-vtysh-config
hostname spine2
log syslog informational
!
interface lo
 description Loopback
 ip address 10.0.0.14/32
!
interface spine2-eth0
 description spine2-eth0 -> leaf1-eth1
 ip address 192.168.60.1/24
!
interface spine2-eth1
 description spine2-eth1 -> leaf2-eth1
 ip address 192.168.61.1/24
!
router bgp 65001
 bgp router-id 10.0.0.14
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 neighbor 192.168.60.2 remote-as 65101
 neighbor 192.168.60.2 timers 3 10
 neighbor 192.168.61.2 remote-as 65101
 neighbor 192.168.61.2 timers 3 10
 !
 address-family ipv4 unicast
  neighbor 192.168.60.2 activate
  neighbor 192.168.61.2 activate
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.60.2 activate
  neighbor 192.168.61.2 activate
 exit-address-family
!
end
