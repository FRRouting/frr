frr defaults datacenter
service integrated-vtysh-config
hostname torm12
log syslog
log timestamp precision 6
!
evpn mh startup-delay 1
!
interface lo
 description Loopback VTEP
!
interface torm12-eth0
 description torm12-eth0 -> leaf1-eth3
 evpn mh uplink
!
interface torm12-eth1
 description torm12-eth1 -> leaf2-eth3
 evpn mh uplink
!
interface hostbond1
 evpn mh es-id 1
 evpn mh es-sys-mac 44:38:39:ff:ff:01
!
interface hostbond2
 evpn mh es-id 2
 evpn mh es-sys-mac 44:38:39:ff:ff:01
!
vrf vrf1
 vni 4000
!
vrf vrf2
 vni 4001
!
route-map ALLOW_LO permit 10
 match interface lo
exit
!
router bgp 65003
 bgp router-id 10.0.0.16
 bgp bestpath as-path multipath-relax
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 192.168.2.1 remote-as 65101
 neighbor 192.168.2.1 timers 3 10
 neighbor 192.168.6.1 remote-as 65101
 neighbor 192.168.6.1 timers 3 10
 !
 address-family ipv4 unicast
  neighbor 192.168.2.1 activate
  neighbor 192.168.6.1 activate
  redistribute connected route-map ALLOW_LO
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.2.1 activate
  neighbor 192.168.6.1 activate
  advertise-all-vni
  advertise-svi-ip
  advertise-default-gw
 exit-address-family
!
end
