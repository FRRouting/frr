frr defaults datacenter
service integrated-vtysh-config
hostname leaf1
log syslog informational
!
interface lo
 description Loopback
 ip address 10.0.0.13/32
!
interface leaf1-eth0
 description leaf1-eth0 -> spine1-eth0
 ip address 192.168.50.2/24
!
interface leaf1-eth1
 description leaf1-eth1 -> spine2-eth0
 ip address 192.168.60.2/24
!
interface leaf1-eth2
 description leaf1-eth2 -> torm11-eth0
 ip address 192.168.1.1/24
!
interface leaf1-eth3
 description leaf1-eth3 -> torm12-eth0
 ip address 192.168.2.1/24
!
interface leaf1-eth4
 description leaf1-eth4 -> torm21-eth0
 ip address 192.168.3.1/24
!
interface leaf1-eth5
 description leaf1-eth5 -> torm22-eth0
 ip address 192.168.4.1/24
!
router bgp 65101
 bgp router-id 10.0.0.13
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 neighbor SPINE peer-group
 neighbor SPINE remote-as 65001
 neighbor SPINE timers 3 10
 neighbor TOR peer-group
 neighbor TOR timers 3 10
 neighbor 192.168.50.1 peer-group SPINE
 neighbor 192.168.60.1 peer-group SPINE
 neighbor 192.168.1.2 remote-as 65002
 neighbor 192.168.1.2 peer-group TOR
 neighbor 192.168.2.2 remote-as 65003
 neighbor 192.168.2.2 peer-group TOR
 neighbor 192.168.3.2 remote-as 65004
 neighbor 192.168.3.2 peer-group TOR
 neighbor 192.168.4.2 remote-as 65005
 neighbor 192.168.4.2 peer-group TOR
 !
 address-family ipv4 unicast
  neighbor SPINE activate
  neighbor TOR activate
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINE activate
  neighbor TOR activate
 exit-address-family
!
end
