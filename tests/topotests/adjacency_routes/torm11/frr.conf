!
!
!debug zebra kernel msgdump recv
!debug zebra events
!debug zebra rib det
!debug zebra neigh
!debug zebra dplane
!
int torm11-eth0
  ip addr 192.168.1.2/24
!
int torm11-eth1
  ip addr 192.168.5.2/24
!
int lo
  ip addr 192.168.100.15/32
!
int hostbond1
  host-routes-enable
!
!
!
frr defaults datacenter
!
!
!debug bgp zebra
!debug bgp updates
!debug bgp neigh
!debug bgp bestpath <prefix>
!
!
router bgp 65011
  bgp router-id 192.168.100.15
  no bgp ebgp-requires-policy
  address-family ipv4 unicast
    neighbor 192.168.1.1 remote-as external
    neighbor 192.168.5.1 remote-as external
    redistribute connected
    redistribute adjacency
exit-address-family
exit
!
