!
interface r1-eth0
 ip address 10.0.0.1/24
 ip ospf priority 100
 ip ospf hello-interval 1
 ip ospf dead-interval 4
!
interface r1-eth1
 ip address 10.0.1.1/24
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
!
router ospf
 network 10.0.0.0/24 area 0
 network 10.0.1.0/24 area 0
!
