password 1
hostname rt1
log file isisd.log
!
! debug isis events
! debug isis route-events
! debug isis spf-events
! debug isis sr-events
! debug isis lsp-gen
! debug isis ti-lfa
!
interface lo
 ip router isis 1
 ipv6 router isis 1
 isis passive
!
interface eth-sw1
 ip router isis 1
 ipv6 router isis 1
 isis hello-interval 1
 isis hello-multiplier 10
 isis priority 100
 isis fast-reroute ti-lfa level-1
!
router isis 1
 net 49.0000.0000.0000.0001.00
 is-type level-1
 lsp-gen-interval 2
 topology ipv6-unicast
 segment-routing srv6
  locator loc1
  node-msd
   max-segs-left 3
   max-end-pop 3
   max-h-encaps 2
   max-end-d 5
  fast-reroute ti-lfa
  interface sr0
!
