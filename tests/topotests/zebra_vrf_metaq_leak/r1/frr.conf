hostname r1
!
! RED is user-configured here on purpose: when its kernel netdev is later
! removed, lib/vrf.c vrf_delete() returns before the delete hook (the VRF is
! user-cfged), so only zebra_vrf_disable() runs.  That keeps the VRF's route
! table - and the route_node/rib_dest_t objects - alive across the bounce,
! which is the precondition for the stale meta-queue bit to survive.
!
vrf RED
!
interface r1-eth0
!
