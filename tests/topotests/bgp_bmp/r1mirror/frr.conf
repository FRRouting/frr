interface r1mirror-eth0
 ip address 192.0.2.1/24
!
interface r1mirror-eth1
 ip address 192.168.0.1/24
!
router bgp 65501
 timers bgp 1 10
 bgp router-id 192.168.0.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 neighbor 192.168.0.2 remote-as 65502
!
 bmp mirror buffer-limit 4194304
!
 bmp targets bmpA
  bmp mirror
  bmp connect 192.0.2.10 port 1789 min-retry 100 max-retry 10000
 exit
!
 bmp targets bmpB
  bmp mirror
  bmp connect 192.0.2.20 port 1790 min-retry 100 max-retry 10000
 exit
!
 address-family ipv4 unicast
  neighbor 192.168.0.2 activate
 exit-address-family
exit
