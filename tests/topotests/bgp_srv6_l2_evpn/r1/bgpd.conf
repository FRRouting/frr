frr defaults traditional
bgp send-extra-data zebra
!
route-map PERMIT-ALL permit 10
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 2001:db8:20::2 remote-as 65002
 neighbor 2001:db8:20::2 update-source eth0
 segment-routing srv6
  locator MAIN
 exit
 address-family ipv6 unicast
  network 2001:db8:20::1/128
  neighbor 2001:db8:20::2 activate
  neighbor 2001:db8:20::2 route-map PERMIT-ALL in
  neighbor 2001:db8:20::2 route-map PERMIT-ALL out
 exit-address-family
 address-family l2vpn evpn
  neighbor 2001:db8:20::2 activate
  neighbor 2001:db8:20::2 next-hop-self
  neighbor 2001:db8:20::2 route-map PERMIT-ALL in
  neighbor 2001:db8:20::2 route-map PERMIT-ALL out
  encapsulation srv6
  evi 10
   rd 65001:10
   route-target import 65000:10
   route-target export 65000:10
  exit-evi
  evi 20
   rd 65001:20
   route-target import 65000:20
   route-target export 65000:20
  exit-evi
  vpws-instance V2
   vpws-id source 200 target 100
   vpws-evi 1000
   rd 65002:1000
   route-target both 65001:1000
   interface eth2 sid auto
  exit-vpws-instance
 exit-address-family
exit
