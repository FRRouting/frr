interface eth0
 ip address 10.0.0.1/24
 ipv6 address 2001:db8:20::1/64
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fc00:0:1::/48 block-len 32 node-len 16
   exit
  exit
  l2-evpn
   evi 10 locator MAIN bridge br10
    service-type vlan-based
    vlan 10
   exit
   evi 20 locator MAIN bridge br20
    service-type vlan-based
    vlan 20
   exit
  exit
 exit
exit
!
ipv6 forwarding
