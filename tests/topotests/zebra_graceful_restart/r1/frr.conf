interface r1-eth0
 ip address 192.168.1.1/24
!
interface r1-eth1
 ip address 192.168.2.1/24
!
interface r1-eth2
 ip address 192.168.3.1/24
!
ip route 10.3.0.0/24 192.168.1.12
ip route 10.3.0.0/24 192.168.2.22
!
