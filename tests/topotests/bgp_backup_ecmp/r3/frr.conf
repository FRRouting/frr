!
hostname r3
!
interface r3-eth0
 ip address 10.1.3.3/24
!
interface r3-eth1
 ip address 10.3.6.3/24
!
interface r3-eth2
 ip address 10.3.7.3/24
!
router bgp 65003
 timers bgp 1 10
 bgp router-id 10.255.255.3
 no bgp ebgp-requires-policy
 neighbor 10.1.3.1 remote-as 65001
 neighbor 10.3.6.6 remote-as 65006
 neighbor 10.3.7.7 remote-as 65007
 !
 address-family ipv4 unicast
  neighbor 10.1.3.1 addpath-tx-all-paths
  maximum-paths 2
 exit-address-family
!
