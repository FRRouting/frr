!
hostname r4
!
interface r4-eth0
 ip address 10.2.4.4/24
!
interface r4-eth1
 ip address 10.99.99.4/24
!
router bgp 65004
 timers bgp 1 10
 bgp router-id 10.255.255.4
 no bgp ebgp-requires-policy
 neighbor 10.2.4.2 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.99.99.0/24
  neighbor 10.2.4.2 route-map set-med out
 exit-address-family
!
route-map set-med permit 10
 set metric 100
!
