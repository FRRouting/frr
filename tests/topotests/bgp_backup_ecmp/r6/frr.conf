!
hostname r6
!
interface r6-eth0
 ip address 10.3.6.6/24
!
interface r6-eth1
 ip address 10.99.99.6/24
!
router bgp 65006
 timers bgp 1 10
 bgp router-id 10.255.255.6
 no bgp ebgp-requires-policy
 neighbor 10.3.6.3 remote-as 65003
 !
 address-family ipv4 unicast
  network 10.99.99.0/24
  neighbor 10.3.6.3 route-map set-med out
 exit-address-family
!
route-map set-med permit 10
 set metric 200
!
