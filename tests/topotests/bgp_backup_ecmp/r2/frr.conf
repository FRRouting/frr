!
hostname r2
!
interface r2-eth0
 ip address 10.1.2.2/24
!
interface r2-eth1
 ip address 10.2.4.2/24
!
interface r2-eth2
 ip address 10.2.5.2/24
!
router bgp 65002
 timers bgp 1 10
 bgp router-id 10.255.255.2
 no bgp ebgp-requires-policy
 neighbor 10.1.2.1 remote-as 65001
 neighbor 10.2.4.4 remote-as 65004
 neighbor 10.2.5.5 remote-as 65005
 !
 address-family ipv4 unicast
  neighbor 10.1.2.1 addpath-tx-all-paths
  maximum-paths 2
 exit-address-family
!
