!
hostname r5
!
interface r5-eth0
 ip address 10.2.5.5/24
!
interface r5-eth1
 ip address 10.99.99.5/24
!
router bgp 65005
 timers bgp 1 10
 bgp router-id 10.255.255.5
 no bgp ebgp-requires-policy
 neighbor 10.2.5.2 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.99.99.0/24
  neighbor 10.2.5.2 route-map set-med out
 exit-address-family
!
route-map set-med permit 10
 set metric 100
!
