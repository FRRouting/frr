!
hostname r1
!
interface r1-eth0
 ip address 10.1.2.1/24
!
interface r1-eth1
 ip address 10.1.3.1/24
!
router bgp 65001
 timers bgp 1 10
 bgp router-id 10.255.255.1
 no bgp ebgp-requires-policy
 neighbor 10.1.2.2 remote-as 65002
 neighbor 10.1.3.3 remote-as 65003
 !
 address-family ipv4 unicast
  maximum-paths 2
 exit-address-family
!
