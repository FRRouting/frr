ip forwarding
!
interface lo
 ip address 10.254.254.5/32
 ip ospf passive
 ip pim
!
interface r5-eth0
 ip address 192.168.4.5/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
!
interface r5-eth1
 ip address 192.168.5.5/24
 ip ospf passive
 ip pim
 ip igmp
!
router ospf
  ospf router-id 10.254.254.5
  redistribute connected
!
ip msdp peer 192.168.4.4 source 192.168.4.5
!
ip pim rp 10.254.254.5
