ip forwarding
!
interface lo
 ip address 10.254.254.4/32
 ip ospf passive
 ip pim
!
interface r4-eth0
 ip address 192.168.4.4/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
!
interface r4-eth1
 ip address 192.168.6.4/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
!
router ospf
  ospf router-id 10.254.254.4
  redistribute connected
!
ip msdp peer 192.168.4.5 source 192.168.4.4
!
ip msdp mesh-group mesh1 source 192.168.6.4
ip msdp mesh-group mesh1 member 192.168.6.2
ip msdp mesh-group mesh1 member 192.168.6.3
!
ip pim rp 10.254.254.4
