! Integrated config: multiple netns VRFs with overlapping IPs
! Each VRF has one interface with 10.0.0.1/24 (same address in each VRF)
!
interface r1-eth0 vrf vrf-red
 ip address 10.0.0.1/24
!
interface r1-eth1 vrf vrf-blue
 ip address 10.0.0.1/24
!
interface r1-eth2 vrf vrf-green
 ip address 10.0.0.1/24
!
