hostname r2
password zebra
log stdout
ip forwarding
!
vrf GREEN
 vni 101
 exit-vrf
!
vrf BLUE
 vni 102
 exit-vrf
!
vrf PURPLE
 vni 103
 exit-vrf
!
interface r2-eth0
 ip address 192.168.100.2/24
!
router bgp 65000
 bgp router-id 192.168.100.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor fabric peer-group
 neighbor fabric remote-as 65000
 neighbor fabric capability extended-nexthop
 neighbor 192.168.100.1 peer-group fabric
 neighbor 192.168.100.3 peer-group fabric
 !
 address-family l2vpn evpn
  neighbor fabric activate
  advertise-all-vni
 exit-address-family
!
router bgp 65000 vrf GREEN
 bgp router-id 192.168.101.2
 bgp log-neighbor-changes
 no bgp network import-check
 !
 address-family ipv4 unicast
  import vrf BLUE
  import vrf PURPLE
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast suppress-imported-from-evpn
 exit-address-family
!
router bgp 65000 vrf BLUE
 bgp router-id 192.168.102.2
 bgp log-neighbor-changes
 no bgp network import-check
 !
 address-family ipv4 unicast
  redistribute static
  import vrf GREEN
  import vrf PURPLE
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast suppress-imported-from-evpn
 exit-address-family
!
router bgp 65000 vrf PURPLE
 bgp router-id 192.168.103.2
 bgp log-neighbor-changes
 no bgp network import-check
 !
 address-family ipv4 unicast
  import vrf GREEN
  import vrf BLUE
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast suppress-imported-from-evpn
 exit-address-family
!
