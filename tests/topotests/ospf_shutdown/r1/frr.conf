interface r1-eth0
 ip address 192.168.1.1/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
exit
!
interface r1-eth1
 ip address 192.168.2.1/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
exit
!
interface lo
 ip address 10.254.254.1/32
exit
!
router ospf
 redistribute connected
 capability opaque
exit
