
hostname r1
!
!debug isis te-events
!
interface lo
 ip address 1.1.1.1/32
 ipv6 address fc00:0:1::1/128
 ip router isis 1
 ipv6 router isis 1
 isis passive
!
interface r1-eth0
 ip address 10.0.1.1/24
 ipv6 address fc00:10:0:1::1/64
 link-params
  neighbor 10.0.255.2
 ip router isis 1
 ipv6 router isis 1
 isis circuit-type level-2
 isis hello-interval 1
 isis hello-multiplier 3
 isis network point-to-point
!
interface r1-eth1
 ip address 10.0.4.1/24
 ipv6 address fc00:10:0:4::1/64
 link-params
  neighbor 10.0.255.4
 ip router isis 1
 ipv6 router isis 1
 isis circuit-type level-2
 isis hello-interval 1
 isis hello-multiplier 3
 isis network point-to-point
!
router isis 1
 net 49.0000.0000.0000.0001.00
 is-type level-2-only
 topology ipv6-unicast
 redistribute ipv4 static level-2
 redistribute ipv6 static level-2
 redistribute ipv4 connected level-2
 redistribute ipv6 connected level-2
 lsp-gen-interval 1
 lsp-refresh-interval 10
 max-lsp-lifetime 20
 mpls-te on
 mpls-te router-address 1.1.1.1
 mpls-te router-address ipv6 fc00:0:1::1
 segment-routing on
 segment-routing prefix 1.1.1.1/32 index 1
!
ip forwarding
!
