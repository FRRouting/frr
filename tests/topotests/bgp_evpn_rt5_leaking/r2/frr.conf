! debug zebra vxlan
! debug zebra kernel
! debug zebra dplane
! debug zebra rib
! debug bgp neighbor-events
! debug bgp updates
! debug bgp zebra

vrf r2-vrf-101
 vni 101
 exit-vrf

vrf r2-vrf-102
 vni 102
 exit-vrf
!
interface loop101 vrf r2-vrf-101
 ip address 192.168.101.41/32
 ipv6 address fd00::2/128
!
interface loop102 vrf r2-vrf-102
 ip address 192.168.102.41/32
 ipv6 address fd00:6::2/128
!
interface r2-eth0
 ip address 192.168.100.41/24
!
router bgp 65000
 bgp router-id 192.168.100.41
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 192.168.100.21 remote-as 65000
 neighbor 192.168.100.21 capability extended-nexthop
 !
 address-family l2vpn evpn
  neighbor 192.168.100.21 activate
  advertise-all-vni
 exit-address-family
!
router bgp 65000 vrf r2-vrf-101
 bgp router-id 192.168.100.41
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 192.168.101.41/32
 exit-address-family
 address-family ipv6 unicast
  network fd00::2/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:201
  route-target both 65:101
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
router bgp 65000 vrf r2-vrf-102
 bgp router-id 192.168.100.41
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 192.168.102.41/32
 exit-address-family
 address-family ipv6 unicast
  network fd00:6::2/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:202
  route-target both 65:102
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
