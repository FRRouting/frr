ip forwarding
!
bgp send-extra-data zebra
!
interface r2-eth0
 ip address 192.168.0.2/24
 ip pim
!
interface r2-eth1
 ip address 192.168.2.1/24
 ip pim
!
interface r2-eth2
 ip address 192.168.3.2/24
 ip pim
!
interface lo
 ip address 10.254.254.2/32
 ip pim
 ip pim use-source 10.254.254.2
!
router pim
 msdp timers 10 20 3
 msdp peer 192.168.0.1 source 192.168.0.2 as 65001
 msdp peer 192.168.2.2 source 192.168.2.1 as 65003
 msdp peer 192.168.3.1 source 192.168.3.2 as 65004
 rp 10.254.254.2
 join-prune-interval 5
!
router bgp 65002
 no bgp ebgp-requires-policy
 no bgp network import-check
 neighbor 192.168.0.1 remote-as 65001
 neighbor 192.168.2.2 remote-as 65003
 neighbor 192.168.3.1 remote-as 65004
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!