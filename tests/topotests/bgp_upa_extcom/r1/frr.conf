hostname r1
!
interface r1-eth0
 ip address 10.0.0.1/24
 ipv6 address fd00::1/64
!
ip forwarding
!
!
! Phase 3 test infrastructure: static routes acting as constituent
! prefixes under the 10.10.0.0/22 (IPv4) and 2001:db8:10::/48 (IPv6)
! aggregates.  Tests remove/restore these routes to simulate prefix
! reachability events.
ip route 10.10.1.0/24 Null0
ip route 10.10.2.0/24 Null0
ipv6 route 2001:db8:10:1::/64 Null0
ipv6 route 2001:db8:10:2::/64 Null0
!
router bgp 65001
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as external
 neighbor 10.0.0.2 timers 3 10
 neighbor 10.0.0.2 timers connect 1
 !
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute static
 exit-address-family
!
