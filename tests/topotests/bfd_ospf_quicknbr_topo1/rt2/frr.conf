log file zebra.log
log timestamp precision 3
!
hostname rt2
!
interface lo
 ip address 2.2.2.2/32
 ip ospf area 0.0.0.0
!
interface eth-rt1
 ip address 10.0.1.2/24
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 3
 ip ospf bfd quick
!
ip forwarding
!
bfd
!
router ospf
 ospf router-id 2.2.2.2
!
line vty
!
