log file zebra.log
log timestamp precision 3
!
hostname rt1
!
interface lo
 ip address 1.1.1.1/32
 ip ospf area 0.0.0.0
!
interface eth-rt2
 ip address 10.0.1.1/24
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 3
 ip ospf bfd quick
!
ip forwarding
!
bfd
!
router ospf
 ospf router-id 1.1.1.1
!
line vty
!
