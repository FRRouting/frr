hostname leaf3
!
! debug bgp updates
! debug bgp upa
!

interface leaf3-eth0
 ip address 10.2.0.2/30
!
interface leaf3-eth1
 ip address 10.100.3.1/30
!
interface lo
 ip address 10.0.3.1/32
!
router bgp 65012
 bgp router-id 10.255.3.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! eBGP to R2
 neighbor 10.2.0.1 remote-as 65002
 !
 ! eBGP to Spine
 neighbor 10.100.3.2 remote-as 65100
 !
 address-family ipv4 unicast
  ! Configure aggregate with UPA for constituents from R2
  ! (aggregate will be automatically advertised when constituents are learned)
  ! summary-only: suppress normal constituents, but UPA routes ARE advertised
  aggregate-address 192.168.100.0/24 summary-only upa drop max-routes 10
  !
  neighbor 10.2.0.1 activate
  neighbor 10.100.3.2 activate
  neighbor 10.100.3.2 upa
 exit-address-family
!
