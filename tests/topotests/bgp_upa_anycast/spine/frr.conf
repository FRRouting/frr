hostname spine
!
! debug bgp updates
! debug bgp updates in
! debug bgp updates out
! debug bgp neighbor-events
! debug bgp keepalives
! debug bgp upa
!
!
interface spine-eth0
 ip address 10.100.1.2/30
!
interface spine-eth1
 ip address 10.100.2.2/30
!
interface spine-eth2
 ip address 10.100.3.2/30
!
interface lo
 ip address 10.100.100.1/32
!
router bgp 65100
 bgp router-id 10.255.100.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! eBGP to Leaf1
 neighbor 10.100.1.1 remote-as 65010
 neighbor 10.100.1.1 description Leaf1
 !
 ! eBGP to Leaf2
 neighbor 10.100.2.1 remote-as 65011
 neighbor 10.100.2.1 description Leaf2
 !
 ! eBGP to Leaf3
 neighbor 10.100.3.1 remote-as 65012
 neighbor 10.100.3.1 description Leaf3
 !
 address-family ipv4 unicast
  ! Aggregate for anycast service - suppress constituents between leaves
  ! This prevents Spine from propagating /25 UPA routes between leaves
  aggregate-address 192.168.100.0/24 summary-only
  !
  neighbor 10.100.1.1 activate
  neighbor 10.100.1.1 upa
  !
  neighbor 10.100.2.1 activate
  neighbor 10.100.2.1 upa
  !
  neighbor 10.100.3.1 activate
  neighbor 10.100.3.1 upa
 exit-address-family
!
