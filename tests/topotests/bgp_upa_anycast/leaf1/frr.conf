hostname leaf1
!
! debug bgp updates
! debug bgp updates in
! debug bgp updates out
! debug bgp neighbor-events
! debug bgp keepalives
! debug bgp upa
!
interface leaf1-eth0
 ip address 10.1.0.2/30
!
interface leaf1-eth1
 ip address 10.100.1.1/30
!
interface lo
 ip address 10.0.1.1/32
!
router bgp 65010
 bgp router-id 10.255.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! eBGP to R1
 neighbor 10.1.0.1 remote-as 65001
 !
 ! eBGP to Spine
 neighbor 10.100.1.2 remote-as 65100
 !
 address-family ipv4 unicast
  ! Configure aggregate with UPA for constituents from R1
  ! (aggregate will be automatically advertised when constituents are learned)
  ! summary-only: suppress normal constituents, but UPA routes ARE advertised
  aggregate-address 192.168.100.0/24 summary-only upa drop max-routes 10
  !
  neighbor 10.1.0.1 activate
  neighbor 10.100.1.2 activate
  neighbor 10.100.1.2 upa
 exit-address-family
!
