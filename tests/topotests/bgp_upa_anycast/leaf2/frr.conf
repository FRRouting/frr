hostname leaf2
!
! debug bgp updates
! debug bgp upa
!
interface leaf2-eth0
 ip address 10.1.0.6/30
!
interface leaf2-eth1
 ip address 10.100.2.1/30
!
interface lo
 ip address 10.0.2.1/32
!
router bgp 65011
 bgp router-id 10.255.2.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! eBGP to R1
 neighbor 10.1.0.5 remote-as 65001
 !
 ! eBGP to Spine
 neighbor 10.100.2.2 remote-as 65100
 !
 address-family ipv4 unicast
  ! Configure aggregate with UPA for constituents from R1
  ! (aggregate will be automatically advertised when constituents are learned)
  ! summary-only: suppress normal constituents, but UPA routes ARE advertised
  aggregate-address 192.168.100.0/24 summary-only upa drop max-routes 10
  !
  neighbor 10.1.0.5 activate
  neighbor 10.100.2.2 activate
  neighbor 10.100.2.2 upa
 exit-address-family
!
