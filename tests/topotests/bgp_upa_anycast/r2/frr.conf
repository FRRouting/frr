hostname r2
!
! debug bgp updates
! debug bgp upa
!
interface r2-eth0
 ip address 10.2.0.1/30
!
interface lo
 ip address 10.2.2.1/32
 ! Constituent prefixes for aggregate 192.168.100.0/24
 ip address 192.168.100.1/25
 ip address 192.168.100.129/25
!
router bgp 65002
 bgp router-id 10.2.2.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.2.0.2 remote-as 65012
 !
 address-family ipv4 unicast
  ! Advertise constituent prefixes
  network 192.168.100.0/25
  network 192.168.100.128/25
  !
  neighbor 10.2.0.2 activate
 exit-address-family
!
