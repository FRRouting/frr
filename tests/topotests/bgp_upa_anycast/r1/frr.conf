hostname r1
!
! debug bgp updates
! debug bgp upa
!
interface r1-eth0
 ip address 10.1.0.1/30
!
interface r1-eth1
 ip address 10.1.0.5/30
!
interface lo
 ip address 10.1.1.1/32
 ! Constituent prefixes for aggregate 192.168.100.0/24
 ip address 192.168.100.1/25
 ip address 192.168.100.129/25
!
router bgp 65001
 bgp router-id 10.1.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.1.0.2 remote-as 65010
 neighbor 10.1.0.6 remote-as 65011
 !
 address-family ipv4 unicast
  ! Advertise constituent prefixes
  network 192.168.100.0/25
  network 192.168.100.128/25
  !
  neighbor 10.1.0.2 activate
  neighbor 10.1.0.6 activate
 exit-address-family
!
