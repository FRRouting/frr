!
interface lo
 ip router isis 1
 ipv6 router isis 1
 isis passive
!
interface eth-r4
 ip router isis 1
 ipv6 router isis 1
 isis hello-interval 1
 isis hello-multiplier 3
!
interface eth-r5
 ip router isis 1
 ipv6 router isis 1
 isis hello-interval 1
 isis hello-multiplier 3
!
interface eth-r7
 ip router isis 1
 ipv6 router isis 1
 isis passive
!
router isis 1
 net 49.0000.0000.0000.0006.00
 is-type level-1
 lsp-gen-interval 1
 topology ipv6-unicast
!
