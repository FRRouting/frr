!
! r1 — EVPN advertiser with two netns VRFs (vrf-101, vrf-102)
!       r1's bridges have DIFFERENT MACs per VRF, so r1 advertises
!       type-5 routes with different RMACs from the SAME VTEP IP
!       (192.168.1.1).  When r2 receives these, zebra on r2 detects
!       the RMAC conflict and logs EC_ZEBRA_EVPN_RMAC_CONFLICT.
!
vrf vrf-101
 vni 101
 exit-vrf
!
vrf vrf-102
 vni 102
 exit-vrf
!
interface lo
 ip address 192.168.0.1/32
!
interface eth-rr
 ip address 192.168.1.1/24
!
interface loop101 vrf vrf-101
 ip address 10.0.101.1/32
 ipv6 address fd01::1/128
!
interface loop102 vrf vrf-102
 ip address 10.0.102.1/32
 ipv6 address fd02::1/128
!
ip route 0.0.0.0/0 192.168.1.101
!
router bgp 65000 vrf vrf-101
 bgp router-id 10.0.101.1
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 10.0.101.1/32
 exit-address-family
 address-family ipv6 unicast
  network fd01::1/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:1
  route-target both 65000:101
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
router bgp 65000 vrf vrf-102
 bgp router-id 10.0.102.1
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 10.0.102.1/32
 exit-address-family
 address-family ipv6 unicast
  network fd02::1/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:2
  route-target both 65000:102
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
router bgp 65000
 bgp router-id 192.168.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 192.168.1.101 remote-as 65000
 neighbor 192.168.1.101 capability extended-nexthop
 !
 address-family l2vpn evpn
  neighbor 192.168.1.101 activate
  advertise-all-vni
 exit-address-family
!
