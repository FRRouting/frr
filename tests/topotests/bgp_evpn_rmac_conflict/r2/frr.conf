!
! r2 — EVPN receiver with two Linux VRFs (vrf-101, vrf-102)
!       r2 receives type-5 routes from r1.  Because r1 advertises
!       different RMACs for the same VTEP IP (192.168.1.1) across
!       vrf-101 and vrf-102, zebra on r2 will log the
!       EC_ZEBRA_EVPN_RMAC_CONFLICT warning.
!
vrf vrf-101
 vni 101
 exit-vrf
!
vrf vrf-102
 vni 102
 exit-vrf
!
interface loop101 vrf vrf-101
 ip address 10.0.101.2/32
 ipv6 address fd01::2/128
!
interface loop102 vrf vrf-102
 ip address 10.0.102.2/32
 ipv6 address fd02::2/128
!
interface lo
 ip address 192.168.0.2/32
!
interface eth-rr
 ip address 192.168.2.2/24
!
ip route 0.0.0.0/0 192.168.2.101
!
router bgp 65000 vrf vrf-101
 bgp router-id 10.0.101.2
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 10.0.101.2/32
 exit-address-family
 address-family ipv6 unicast
  network fd01::2/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:11
  route-target both 65000:101
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
router bgp 65000 vrf vrf-102
 bgp router-id 10.0.102.2
 bgp log-neighbor-changes
 no bgp network import-check
 address-family ipv4 unicast
  network 10.0.102.2/32
 exit-address-family
 address-family ipv6 unicast
  network fd02::2/128
 exit-address-family
 address-family l2vpn evpn
  rd 65000:12
  route-target both 65000:102
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
!
router bgp 65000
 bgp router-id 192.168.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 192.168.2.101 remote-as 65000
 neighbor 192.168.2.101 capability extended-nexthop
 !
 address-family l2vpn evpn
  neighbor 192.168.2.101 activate
  advertise-all-vni
 exit-address-family
!
