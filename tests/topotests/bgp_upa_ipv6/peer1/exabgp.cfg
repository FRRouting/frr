neighbor fd00::1 {
    router-id 10.0.0.2;
    local-address fd00::2;
    local-as 65002;
    peer-as 65001;

    family {
        ipv6 unicast;
    }

    static {
        # Route with UPA ExtCom D-bit=0
        # Wire: type=0x03 subtype=0x09 flags=0x00 rsvd=0x00 rid=0x0a000002
        route 2001:db8:99:1::/64 {
            next-hop fd00::2;
            extended-community [0x030900000a000002];
        }

        # Route with UPA ExtCom D-bit=1 (drop)
        # Wire: type=0x03 subtype=0x09 flags=0x80 rsvd=0x00 rid=0x0a000002
        route 2001:db8:99:2::/64 {
            next-hop fd00::2;
            extended-community [0x030980000a000002];
        }
    }
}
