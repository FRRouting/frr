hostname r1
!
interface r1-eth0
 ipv6 address fd00::1/64
!
ipv6 forwarding
!
!
! IPv6 static routes acting as constituent prefixes
! under the 2001:db8:10::/48 aggregate
!
ipv6 route 2001:db8:10:1::/64 Null0
ipv6 route 2001:db8:10:2::/64 Null0
!
router bgp 65001
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor fd00::2 remote-as 65002
 neighbor fd00::2 timers 3 10
 neighbor fd00::2 timers connect 1
 !
 address-family ipv6 unicast
  neighbor fd00::2 activate
  redistribute static
 exit-address-family
!
