!
hostname r2
password zebra
log file /tmp/r2-frr.log
!
interface r2-eth0
 ip address 10.0.0.2/24
 ip igmp
 ip pim
!
interface r2-eth1
 ip address 10.0.2.2/24
 ip igmp
 ip pim
!
router ospf
  network 10.0.0.0/16 area 0
!
router pim
  bsr candidate-bsr priority 100 source address 10.0.0.2
!
ip forwarding
!
