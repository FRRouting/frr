! Zebra configuration for Spine
hostname spine
log file /tmp/spine-zebra.log
!
interface lo
 ip address 10.0.0.1/32
!
interface spine-eth0
 description to R1
 ip address 192.168.10.2/24
!
interface spine-eth1
 description to R2
 ip address 192.168.20.2/24
!
interface spine-eth2
 description to R3
 ip address 192.168.30.2/24
!
ip forwarding
!
line vty
!
