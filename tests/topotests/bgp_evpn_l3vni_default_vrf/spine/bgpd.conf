! BGP configuration for Spine (eBGP underlay + EVPN route reflector)
hostname spine
log file /tmp/spine-bgpd.log
!
router bgp 65000
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 192.168.10.1 remote-as 65001
 neighbor 192.168.10.1 description R1
 neighbor 192.168.20.1 remote-as 65002
 neighbor 192.168.20.1 description R2
 neighbor 192.168.30.1 remote-as 65003
 neighbor 192.168.30.1 description R3
 !
 address-family ipv4 unicast
  neighbor 192.168.10.1 activate
  neighbor 192.168.20.1 activate
  neighbor 192.168.30.1 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.10.1 activate
  neighbor 192.168.20.1 activate
 exit-address-family
!
line vty
!
