! BGP configuration for R3
hostname r3
log file /tmp/r3-bgpd.log
!
router bgp 65003
 bgp router-id 10.0.3.3
 no bgp ebgp-requires-policy
 neighbor 192.168.30.2 remote-as 65000
 neighbor 192.168.30.2 description Spine
 !
 address-family ipv4 unicast
  network 10.0.3.3/32
  network 192.168.3.0/24
  neighbor 192.168.30.2 activate
 exit-address-family
!
line vty
!
