! FRR configuration for R3
hostname r3
!
interface lo
 ip address 10.0.3.3/32
!
interface r3-eth0
 description to Spine
 ip address 192.168.30.1/24
!
interface r3-eth1
 description to clients
 ip address 192.168.3.1/24
!
ip forwarding
!
router bgp 65003
 bgp router-id 10.0.3.3
 no bgp ebgp-requires-policy
 neighbor 192.168.30.2 remote-as 65000
 neighbor 192.168.30.2 description Spine
 !
 address-family ipv4 unicast
  network 10.0.3.3/32
  network 192.168.3.0/24
  neighbor 192.168.30.2 activate
 exit-address-family
!
line vty
!
