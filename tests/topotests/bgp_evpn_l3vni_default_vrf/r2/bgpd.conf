! BGP configuration for R2
hostname r2
log file /tmp/r2-bgpd.log
!
ip prefix-list UNDERLAY_ONLY seq 5 permit 10.0.2.2/32
!
router bgp 65002
 bgp router-id 10.0.2.2
 no bgp ebgp-requires-policy
 neighbor 192.168.20.2 remote-as 65000
 neighbor 192.168.20.2 description Spine
 !
 address-family ipv4 unicast
  network 10.0.2.2/32
  neighbor 192.168.20.2 activate
  neighbor 192.168.20.2 prefix-list UNDERLAY_ONLY out
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.20.2 activate
  advertise-all-vni
  advertise ipv4 unicast
  route-target import 65001:5000
  route-target export 65001:5000
 exit-address-family
!
line vty
!
