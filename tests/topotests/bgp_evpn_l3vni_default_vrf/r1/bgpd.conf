! BGP configuration for R1
hostname r1
log file /tmp/r1-bgpd.log
!
ip prefix-list UNDERLAY_ONLY seq 5 permit 10.0.1.1/32
!
router bgp 65001
 bgp router-id 10.0.1.1
 no bgp ebgp-requires-policy
 neighbor 192.168.10.2 remote-as 65000
 neighbor 192.168.10.2 description Spine
 !
 address-family ipv4 unicast
  network 10.0.1.1/32
  network 192.168.1.0/24
  neighbor 192.168.10.2 activate
  neighbor 192.168.10.2 prefix-list UNDERLAY_ONLY out
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.10.2 activate
  advertise-all-vni
  advertise ipv4 unicast
  route-target import 65001:5000
  route-target export 65001:5000
 exit-address-family
!
line vty
!
