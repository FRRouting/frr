! Zebra configuration for R1
hostname r1
log file /tmp/r1-zebra.log
!
interface lo
 ip address 10.0.1.1/32
!
interface r1-eth0
 description to Spine
 ip address 192.168.10.1/24
!
interface r1-eth1
 description to clients
 ip address 192.168.1.1/24
!
interface vxlan5000
 description L3VNI for default VRF
!
vni 5000
!
ip forwarding
!
line vty
!
