interface lo
 ip address 172.16.255.254/32
 ip address 172.16.255.253/32
!
interface r1-eth0
 ip address 192.168.255.1/24
!
ip forwarding
!
hostname r1
log stdout
!
router bgp 65000
 no bgp ebgp-requires-policy
 no bgp network import-check
 neighbor 192.168.255.2 remote-as 65001
 neighbor 192.168.255.2 timers 3 10
 !
 address-family ipv4 unicast
  network 172.16.255.254/32 route-map r2-out-rt
  network 172.16.255.253/32 route-map r2-out-soo
 exit-address-family
!
route-map r2-out-rt permit 10
 set extcommunity rt 65001:100 65001:200 65001:300
!
route-map r2-out-soo permit 10
 set extcommunity soo 65002:100 65002:250 65002:300 65002:400
 set extcommunity bandwidth 100
!
