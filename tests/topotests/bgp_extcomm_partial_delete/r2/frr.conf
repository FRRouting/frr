interface r2-eth0
 ip address 192.168.255.2/24
!
ip forwarding
!
hostname r2
log stdout
!
bgp extcommunity-list expanded r1-rt permit 65001:(1[0-9]{2}|2[0-4][0-9]|250)
bgp extcommunity-list expanded r1-soo permit 65002:(2[0-4][0-9]|25[0-9]|3[0-4][0-9]|350)
!
ip prefix-list RT-PREFIX seq 5 permit 172.16.255.254/32
ip prefix-list SOO-PREFIX seq 5 permit 172.16.255.253/32
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 192.168.255.1 remote-as 65000
 neighbor 192.168.255.1 timers 3 10
 !
 address-family ipv4 unicast
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-map r1-in in
 exit-address-family
!
route-map r1-in permit 10
 match ip address prefix-list RT-PREFIX
 set extended-comm-list delete r1-rt
!
route-map r1-in permit 20
 match ip address prefix-list SOO-PREFIX
 set extended-comm-list delete r1-soo
!
route-map r1-in permit 30
!
