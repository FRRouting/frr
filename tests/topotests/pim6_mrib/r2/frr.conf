!
hostname r2
password zebra
log file /tmp/r2-frr.log
!
!debug pim nht
!debug pim nht detail
!debug pim nht rp
!
interface r2-eth0
 ip address 10.0.0.2/24
 ip igmp
 ip pim
!
interface r2-eth1
 ip address 10.0.2.2/24
 ip igmp
 ip pim
!
ip forwarding
!
ip route fdd6:b518:3bf5::/48 10.0.0.1 50
ip route fdab:94cb:f56c::/48 10.0.2.4 50
!
router pim
 rpf-lookup-mode mrib-then-urib
 rp 10.0.0.1 224.0.0.0/4
 rp 10.0.1.1 225.0.0.0/24
!