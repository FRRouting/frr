interface r2-eth0
 ip address 192.168.1.2/24
 ipv6 address fc00::2/64
!
interface lo
 ip address 10.10.10.1/32
 ipv6 address fd00::1/128
!
bfd
 profile admin-test
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
 peer 192.168.1.1 interface r2-eth0
  profile admin-test
 !
 peer fc00::1 interface r2-eth0
  profile admin-test
 !
!
