interface r1-eth0
 ip address 192.168.1.1/24
 ipv6 address fc00::1/64
!
ip route 10.10.10.0/24 192.168.1.2 bfd
ipv6 route fd00::/64 fc00::2 bfd
!
bfd
 profile admin-test
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
 peer 192.168.1.2 interface r1-eth0
  profile admin-test
 !
 peer fc00::2 interface r1-eth0
  profile admin-test
 !
!
