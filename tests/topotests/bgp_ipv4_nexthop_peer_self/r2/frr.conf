!
! R2 - Originates test prefix 203.0.113.1/32 and sends to R3 with route-map
! that explicitly sets next-hop to R3's address (10.0.0.3).
! RFC 4271 Section 5.1.3 fix detects this and corrects the next-hop to
! R2's address (10.0.0.2) to avoid blackhole.
! Copyright (c) 2026 by Samsung R&D Institute India
! Author: Sri Mohan <sri.mohan@samsung.com>
!
frr defaults datacenter
!
interface r2-eth0
 ip address 10.0.0.2/24
!
interface lo
 ip address 203.0.113.1/32
!
route-map SET_NH_PEER permit 10
 set ip next-hop 10.0.0.3
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.0.3 remote-as 65002
 !
 address-family ipv4 unicast
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.3 route-map SET_NH_PEER out
  redistribute connected
 exit-address-family
!
