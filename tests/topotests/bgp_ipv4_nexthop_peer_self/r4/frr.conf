!
! R4 - IBGP speaker (should NOT receive re-advertised routes from R3 per RFC 4271)
! Copyright (c) 2026 by Samsung R&D Institute India
! Author: Sri Mohan <sri.mohan@samsung.com>
!
frr defaults datacenter
!
interface r4-eth0
 ip address 10.0.1.4/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.1.3 remote-as 65002
 !
 address-family ipv4 unicast
  neighbor 10.0.1.3 activate
 exit-address-family
!
