!
! R3 - IBGP transit speaker (should NOT re-advertise IBGP-learned routes to R4)
! Copyright (c) 2026 by Samsung R&D Institute India
! Author: Sri Mohan <sri.mohan@samsung.com>
!
frr defaults datacenter
!
interface r3-eth0
 ip address 10.0.0.3/24
!
interface r3-eth1
 ip address 10.0.1.3/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.1.4 remote-as 65002
 !
 address-family ipv4 unicast
  neighbor 10.0.0.2 activate
  neighbor 10.0.1.4 activate
 exit-address-family
!
