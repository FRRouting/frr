!
interface r1-eth0
 ip address 192.168.12.1/24
!
ip route 10.0.0.1/32 Null0
ip route 10.0.0.11/32 Null0
!
ip prefix-list plist-out seq 5 permit 10.0.0.1/32
ip prefix-list plist-in seq 5 permit 10.0.0.2/32
!
router bgp 65001
 bgp router-id 10.0.0.1
 bgp route-map delay-timer 1
 neighbor 192.168.12.2 remote-as 65002
 neighbor 192.168.12.2 timers 1 3
 neighbor 192.168.12.2 timers connect 1
!
 address-family ipv4 unicast
  redistribute static
  neighbor 192.168.12.2 prefix-list plist-out out
  neighbor 192.168.12.2 prefix-list plist-in in
 exit-address-family
!
