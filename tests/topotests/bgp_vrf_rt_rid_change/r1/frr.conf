!
router bgp 65000 vrf RED
 bgp router-id 192.168.2.1
 no bgp network import-check
 address-family ipv4 unicast
  network 198.51.100.1/32
  rd vpn export 65000:6
  rt vpn both 65000:100
  export vpn
 exit-address-family
exit
