interface r1-eth0
 ip address 192.168.1.1/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
exit
!
interface r1-eth1
 ip address 192.168.2.1/24
 ip igmp
 ip pim passive
exit
!
interface lo
 ip address 10.254.254.1/32
 ip pim passive
exit
!
router ospf
 redistribute connected
exit
!
router pim
 rp 10.254.254.1
exit
