interface r2-eth0
 ip address 192.168.1.2/24
 ip ospf area 0
 ip ospf hello-interval 2
 ip ospf dead-interval 8
 ip pim
exit
!
interface lo
 ip address 10.254.254.2/32
 ip igmp
 ip igmp join 225.0.0.1
 ip pim passive
exit
!
router ospf
 redistribute connected
exit
!
router pim
 rp 10.254.254.1
exit
