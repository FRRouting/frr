hostname rt2
!
log commands
!
! debug ospf zebra
! debug ospf event
! debug ospf lsa
! debug ospf te
! debug ospf packet all
! debug ospf packet ls-update detail
! debug ospf ism
! debug ospf nsm
! debug ospf nssa
! debug ospf graceful-restart
! debug zebra event
! debug zebra packet
! debug zebra rib
! debug zebra kernel
!
interface lo
 ip address 2.2.2.2/32
 ip ospf area 0
!
interface eth-rt1
 ip address 10.0.1.2/24
 ip ospf network point-to-point
 ip ospf area 1
 ip ospf hello-interval 3
 ip ospf dead-interval 9
!
interface eth-rt3
 ip address 10.0.2.2/24
 ip ospf network point-to-point
 ip ospf area 0
 ip ospf hello-interval 3
 ip ospf dead-interval 9
!
router ospf
 router-id 2.2.2.2
 graceful-restart grace-period 120
 graceful-restart helper enable
!
