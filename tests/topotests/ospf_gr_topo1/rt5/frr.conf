hostname rt5
!
log commands
!
! debug ospf zebra
! debug ospf event
! debug ospf lsa
! debug ospf te
! debug ospf packet all
! debug ospf packet ls-update detail
! debug ospf ism
! debug ospf nsm
! debug ospf nssa
! debug ospf graceful-restart
! debug zebra event
! debug zebra packet
! debug zebra rib
! debug zebra kernel
!
interface lo
 ip address 5.5.5.5/32
 ip ospf area 2
!
interface eth-rt4
 ip address 10.0.5.5/24
 ip ospf network point-to-point
 ip ospf area 2
 ip ospf hello-interval 3
 ip ospf dead-interval 9
!
router ospf
 router-id 5.5.5.5
 graceful-restart grace-period 120
 graceful-restart helper enable
!
