!
int lo
 ip address 192.0.2.3/32
 ipv6 address fc00::3/128
!
interface r3-eth0
 ipv6 address 2001:db8:1::3/64
!
ipv6 route fc00::1/128 2001:db8:1::2
ipv6 route fc00::2/128 2001:db8:1::2

ipv6 route 1111:1111:1111::/48 2001:db8:1::2
ipv6 route 2222:2222:1111::/48 2001:db8:1::2

router bgp 65003
 no bgp ebgp-requires-policy
 neighbor fc00::2 remote-as 65002
 neighbor fc00::2 timers 1 3
 neighbor fc00::2 timers connect 1
 neighbor fc00::2 ebgp-multihop 3
 neighbor fc00::2 update-source fc00::3
 address-family ipv4 unicast
  no neighbor fc00::2 activate
 exit-address-family
 address-family l2vpn evpn
  neighbor fc00::2 activate
 exit-address-family
!
