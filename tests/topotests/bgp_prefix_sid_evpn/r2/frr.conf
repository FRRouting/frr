!
int lo
 ip address 192.0.2.2/32
 ipv6 address fc00::2/128
!
interface r2-eth0
 ipv6 address 2001:db8::2/64
!
interface r2-eth1
 ipv6 address 2001:db8:1::2/64
!

ipv6 route fc00::1/128 2001:db8::1
ipv6 route fc00::3/128 2001:db8:1::3

ipv6 route 1111:1111:1111::/48 2001:db8::1
ipv6 route 2222:2222:1111::/48 2001:db8::1

router bgp 65002
 no bgp ebgp-requires-policy
 neighbor fc00::1 remote-as 65001
 neighbor fc00::1 timers connect 1
 neighbor fc00::1 ebgp-multihop 3
 neighbor fc00::1 update-source fc00::2
 neighbor fc00::3 remote-as 65003
 neighbor fc00::3 timers 1 3
 neighbor fc00::3 timers connect 1
 neighbor fc00::3 ebgp-multihop 3
 neighbor fc00::3 update-source fc00::2
 address-family ipv4 unicast
  no neighbor fc00::1 activate
  no neighbor fc00::3 activate
 exit-address-family
 address-family l2vpn evpn
  neighbor fc00::1 activate
  neighbor fc00::3 activate
 exit-address-family
!
