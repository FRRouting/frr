neighbor 10.0.2.1 {
	router-id 10.0.2.105;
	local-address 10.0.2.105;
	local-as 65003;
	peer-as 65002;

	family {
		ipv4 mup;
		ipv6 mup;
	}
	announce {
		ipv4 {
			# ISD: gNB-facing prefix reachable through an
			# interworking SRv6 endpoint.
			mup \
			mup-isd 10.99.0.0/24 rd 100:100 \
			next-hop 10.0.2.105 \
			extended-community [ target:65001:1 ];

			# DSD: direct-mode SRv6 endpoint, advertised with the
			# MUP Extended Community Direct-Type Segment Identifier.
			mup \
			mup-dsd 10.0.0.250 rd 300:300 \
			next-hop 10.0.2.105 \
			extended-community [ target:65001:1 mup:65001:10 ];

			# T1ST: one GTP-U session toward UE prefix
			# 192.168.1.5/32 behind endpoint 10.99.0.5.
			mup \
			mup-t1st 192.168.1.5/32 rd 100:100 teid 12345 qfi 9 \
			endpoint 10.99.0.5 source 10.0.2.105 \
			next-hop 10.0.2.105 \
			extended-community [ target:65001:1 ];

			# T2ST: GTP-U endpoint 10.0.0.250, TEID 12345.
			mup \
			mup-t2st 10.0.0.250 rd 100:100 teid 12345/32 \
			next-hop 10.0.2.105 \
			extended-community [ target:65001:1 mup:65001:10 ];
		}
		ipv6 {
			# One route of each MUP type on the IPv6 sub-AFI.
			mup \
			mup-isd 2001:db8:99::/64 rd 200:200 \
			next-hop 2001:db8:2::105 \
			extended-community [ target:65001:2 ];

			mup \
			mup-dsd 2001:db8:99::250 rd 300:300 \
			next-hop 2001:db8:2::105 \
			extended-community [ target:65001:2 mup:65001:10 ];

			mup \
			mup-t1st 2001:db8:aa::/64 rd 200:200 teid 12345 qfi 9 \
			endpoint 2001:db8:99::5 source 2001:db8:2::105 \
			next-hop 2001:db8:2::105 \
			extended-community [ target:65001:2 ];

			mup \
			mup-t2st 2001:db8:99::250 rd 200:200 teid 12345/32 \
			next-hop 2001:db8:2::105 \
			extended-community [ target:65001:2 mup:65001:10 ];
		}
	}
}
