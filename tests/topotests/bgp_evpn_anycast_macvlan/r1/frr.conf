debug zebra kernel
debug zebra evpn mh neigh
debug zebra vxlan
int r1-eth0
  ip addr 10.0.0.1/30
!
ip route 1.1.1.2/32 10.0.0.2
!
vrf RED
 vni 1000
exit-vrf
!
router bgp 65001
 no bgp ebgp-requires-policy
 no bgp reject-as-sets
 no bgp default ipv4-unicast
 no bgp network import-check
 neighbor 1.1.1.2 remote-as 65002
 neighbor 1.1.1.2 ebgp-multihop 3
 no neighbor 1.1.1.2 enforce-first-as
 neighbor 1.1.1.2 update-source lo
 !
 address-family l2vpn evpn
  neighbor 1.1.1.2 activate
  advertise-all-vni
  vni 200
   rd 1000:200
   route-target import 1000:200
   route-target export 1000:200
  exit-vni
  vni 100
   rd 1000:100
   route-target import 1000:100
   route-target export 1000:100
  exit-vni
 exit-address-family
exit
!
router bgp 65001 vrf RED
 no bgp ebgp-requires-policy
 no bgp reject-as-sets
 no bgp default ipv4-unicast
 no bgp network import-check
 !
 address-family ipv4 unicast
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 1000:1000
  route-target import 1000:1000
  route-target export 1000:1000
 exit-address-family
exit
!
