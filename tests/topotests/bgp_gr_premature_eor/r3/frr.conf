!
! r3 - graceful-restart helper (the "Arista" in the report).
! Receives r1's routes via r2 and retains them as stale while r2 restarts,
! until r2 sends its End-of-RIB.
!
interface r3-eth0
 ip address 192.168.23.3/24
!
router bgp 65003
 no bgp ebgp-requires-policy
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 neighbor 192.168.23.2 remote-as external
 neighbor 192.168.23.2 timers 3 9
 neighbor 192.168.23.2 timers connect 1
!
