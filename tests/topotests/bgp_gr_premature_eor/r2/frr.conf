!
! r2 - the graceful-restart "restarting speaker" (device under test).
! Learns routes from r1 (upstream) and advertises them to r3 (helper).
!
! restart-time is advertised to r3 so r3 keeps r2's routes staled long enough.
! select-defer-time keeps best-path selection deferred while r2 relearns; it
! is the upper bound on how long r2 should hold off its End-of-RIB to r3.
!
interface r2-eth0
 ip address 192.168.12.2/24
!
interface r2-eth1
 ip address 192.168.23.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart restart-time 300
 bgp graceful-restart select-defer-time 120
 neighbor 192.168.12.1 remote-as external
 neighbor 192.168.12.1 timers 3 9
 neighbor 192.168.12.1 timers connect 1
 neighbor 192.168.23.3 remote-as external
 neighbor 192.168.23.3 timers 3 9
 neighbor 192.168.23.3 timers connect 1
!
