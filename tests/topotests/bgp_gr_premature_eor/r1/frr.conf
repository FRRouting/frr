!
! r1 - upstream route origin. Feeds routes to r2 (the restarting speaker).
!
interface lo
 ip address 172.16.255.1/32
!
interface r1-eth0
 ip address 192.168.12.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 bgp graceful-restart
 bgp graceful-restart preserve-fw-state
 bgp graceful-restart restart-time 300
 neighbor 192.168.12.2 remote-as external
 neighbor 192.168.12.2 timers 3 9
 neighbor 192.168.12.2 timers connect 1
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
