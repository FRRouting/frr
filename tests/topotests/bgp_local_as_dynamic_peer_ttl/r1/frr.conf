!
! r1 listens for dynamic peers on a peer-group where remote-as and
! local-as are both 65001, while the bgp instance itself is 4271548441.
! Loopbacks use RFC5737 documentation space (192.0.2.0/24).
!
interface lo
 ip address 192.0.2.1/32
!
interface r1-eth0
 ip address 10.0.12.1/24
!
ip route 192.0.2.3/32 10.0.12.2
!
router bgp 4271548441
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp router-id 192.0.2.1
 bgp log-neighbor-changes
 !
 neighbor PG_DYN peer-group
 neighbor PG_DYN remote-as 65001
 neighbor PG_DYN local-as 65001 no-prepend replace-as
 neighbor PG_DYN update-source lo
 neighbor PG_DYN timers 3 9
 neighbor PG_DYN timers connect 1
 !
 bgp listen range 192.0.2.0/24 peer-group PG_DYN
 !
 address-family ipv4 unicast
  neighbor PG_DYN activate
 exit-address-family
!
