interface lo
 ip address 10.254.0.4/32
!
interface r4-eth0
 ip address 10.0.3.4/24
 no shutdown
!
router bgp 65004
 no bgp ebgp-requires-policy
 timers bgp 3 9
 neighbor 10.0.3.1 remote-as 65001
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
router rip
 timers basic 5 15 10
 redistribute connected
 network 10.0.3.0/24
!
