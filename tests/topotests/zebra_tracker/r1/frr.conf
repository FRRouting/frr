interface lo
 ip address 10.254.0.1/32
!
interface r1-eth0
 ip address 10.0.1.1/24
 no shutdown
!
interface r1-eth1
 ip address 10.0.2.1/24
 no shutdown
!
interface r1-eth2
 ip address 10.0.3.1/24
 no shutdown
!
interface r1-eth3
 ip address 10.0.4.1/24
 no shutdown
!
zebra nexthop-group tracker 20
!
router bgp 65001
 no bgp ebgp-requires-policy
 timers bgp 3 9
 neighbor 10.0.1.2 remote-as 65002
 neighbor 10.0.2.3 remote-as 65003
 neighbor 10.0.3.4 remote-as 65004
 neighbor 10.0.4.5 remote-as 65005
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
router rip
 timers basic 5 15 10
 redistribute connected
 network 10.0.1.0/24
 network 10.0.2.0/24
 network 10.0.3.0/24
 network 10.0.4.0/24
!
