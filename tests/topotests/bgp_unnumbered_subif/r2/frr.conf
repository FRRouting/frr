!
interface lo
 ip address 10.10.10.2/32
!
interface r2-eth0.100
 ipv6 nd ra-interval 1
 no ipv6 nd suppress-ra
!
interface r2-eth0.200
 ipv6 nd ra-interval 1
 no ipv6 nd suppress-ra
!
ip forwarding
ipv6 forwarding
!
router bgp 65002
 bgp router-id 10.10.10.2
 no bgp ebgp-requires-policy
 timers bgp 3 9
 neighbor r2-eth0.100 interface remote-as external
 neighbor r2-eth0.200 interface remote-as external
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
