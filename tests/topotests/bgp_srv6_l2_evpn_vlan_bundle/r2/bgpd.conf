frr defaults traditional
bgp send-extra-data zebra
!
route-map PERMIT-ALL permit 10
exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 2001:db8:20::1 remote-as 65001
 neighbor 2001:db8:20::1 update-source eth0
 address-family ipv6 unicast
  network 2001:db8:20::2/128
  neighbor 2001:db8:20::1 activate
  neighbor 2001:db8:20::1 route-map PERMIT-ALL in
  neighbor 2001:db8:20::1 route-map PERMIT-ALL out
 exit-address-family
 address-family l2vpn evpn
  neighbor 2001:db8:20::1 activate
  neighbor 2001:db8:20::1 next-hop-self
  neighbor 2001:db8:20::1 route-map PERMIT-ALL in
  neighbor 2001:db8:20::1 route-map PERMIT-ALL out
  encapsulation srv6
  evi 50001
   rd 65002:50001
   route-target import 65000:50001
   route-target export 65000:50001
  exit-evi
 exit-address-family
exit
