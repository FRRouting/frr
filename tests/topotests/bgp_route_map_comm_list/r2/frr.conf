interface r2-eth0
 ip address 192.168.1.2/24
!
ip forwarding
!
hostname r2
!
log stdout
!
bgp community-list standard CL_ADD permit 65001:111
bgp community-list standard CL_DEL permit 65001:99
bgp community-list standard CL_REP permit 65001:222
!
router bgp 65002
 no bgp ebgp-requires-policy
 bgp router-id 192.168.1.2
 no bgp network import-check
 neighbor 192.168.1.1 remote-as 65001
 !
 address-family ipv4 unicast
  neighbor 192.168.1.1 activate
  neighbor 192.168.1.1 route-map RM_IN in
 exit-address-family
!
ip prefix-list PL_ADD permit 10.1.1.0/24
ip prefix-list PL_DEL permit 10.1.2.0/24
ip prefix-list PL_REP permit 10.1.3.0/24
ip prefix-list PL_ADD_DEL permit 10.1.4.0/24
!
route-map RM_IN permit 10
 match ip address prefix-list PL_ADD
 set comm-list add CL_ADD
!
route-map RM_IN permit 20
 match ip address prefix-list PL_DEL
 set comm-list delete CL_DEL
!
route-map RM_IN permit 30
 match ip address prefix-list PL_REP
 set comm-list replace CL_REP
!
route-map RM_IN permit 40
 match ip address prefix-list PL_ADD_DEL
 set comm-list delete CL_DEL
 set comm-list add  CL_ADD
 !
route-map RM_IN permit 50
!
