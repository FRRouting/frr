interface r1-eth0
 ip address 192.168.1.1/24
!
ip forwarding
!
hostname r1
log stdout
!
router bgp 65001
 no bgp ebgp-requires-policy
 bgp router-id 192.168.1.1
 no bgp network import-check
 neighbor 192.168.1.2 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.1.1.0/24
  network 10.1.2.0/24
  network 10.1.3.0/24
  network 10.1.4.0/24
  neighbor 192.168.1.2 route-map RM_OUT out
 exit-address-family
!

ip prefix-list PL_ADD permit 10.1.1.0/24
ip prefix-list PL_DEL permit 10.1.2.0/24
ip prefix-list PL_REP permit 10.1.3.0/24
ip prefix-list PL_ADD_DEL permit 10.1.4.0/24
!
route-map RM_OUT permit 10
 match ip address prefix-list PL_ADD
 set community 65001:10
!
route-map RM_OUT permit 20
 match ip address prefix-list PL_DEL
 set community 65001:20 65001:99
!
route-map RM_OUT permit 30
 match ip address prefix-list PL_REP
 set community 65001:30
!
route-map RM_OUT permit 40
 match ip address prefix-list PL_ADD_DEL
 set community 65001:30 65001:20 65001:99

!
