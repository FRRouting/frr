interface r3-stubnet
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network broadcast
 ipv6 ospf6 hello-interval 2
 ipv6 ospf6 dead-interval 10
!
interface r3-sw5
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network broadcast
 ipv6 ospf6 hello-interval 2
 ipv6 ospf6 dead-interval 10
 ipv6 ospf6 priority 0
!
router ospf6
 ospf6 router-id 10.0.0.3
 log-adjacency-changes detail
 redistribute static
!
