!
interface r3-stubnet
 ipv6 address fc00:3:3:3::3/64
!
interface r3-sw5
 ipv6 address fc00:a:a:a::3/64
!
interface lo
!
ipv6 route fc00:3333:3333:3333::/64 fc00:3:3:3::1234
