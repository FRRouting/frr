hostname r1
!
ipv6 forwarding
!
interface r1-eth0
 ipv6 address 2001:db8:12::1/64
 ipv6 ospf6 area 0
 ipv6 ospf6 hello-interval 2
 ipv6 ospf6 dead-interval 10
!
interface r1-eth1
 ipv6 address 2001:db8:13::1/64
 ipv6 ospf6 area 1
 ipv6 ospf6 hello-interval 2
 ipv6 ospf6 dead-interval 10
!
router ospf6
 ospf6 router-id 10.0.0.1
!
