!
hostname r1
!
ip router-id 10.10.10.1
ipv6 router-id fd00:cafe::1
!
debug pathd pcep basic message pceplib
!
interface r1-eth0
 ip address 10.10.10.1/24
 ipv6 address fd00:cafe::1/64
!
segment-routing
 traffic-eng
  segment-list SL1
   index 10 mpls label 16010
   index 20 mpls label 16020
  !
  policy color 1 endpoint 10.10.10.100
   name POLICY_TO_PCE
   binding-sid 1111
   candidate-path preference 100 name CANDIDATE_LOCAL explicit segment-list SL1
  !
  pcep
   pce-config GROUP1
    timer keep-alive 5
    timer dead-timer 20
    source-address ip 10.10.10.1 port 4998
   !
   pce PCE_SIM
    config GROUP1
    address ip 10.10.10.100
   !
   pcc
    peer PCE_SIM precedence 10
   !
  !
 !
!
