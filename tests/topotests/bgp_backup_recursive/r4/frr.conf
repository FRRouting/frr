!
hostname r4
!
interface lo
 ip address 10.255.255.4/32
!
interface r4-eth0
 ip address 10.0.24.4/24
!
interface r4-eth1
 ip address 10.99.99.4/24
!
ip route 10.255.255.1/32 10.0.24.2
!
router bgp 65001
 timers bgp 1 10
 bgp router-id 10.255.255.4
 no bgp ebgp-requires-policy
 neighbor 10.255.255.1 remote-as 65001
 neighbor 10.255.255.1 update-source lo
 !
 address-family ipv4 unicast
  network 10.99.99.0/24
  neighbor 10.255.255.1 activate
  neighbor 10.255.255.1 next-hop-self
  neighbor 10.255.255.1 route-map set-med out
 exit-address-family
!
route-map set-med permit 10
 set metric 100
!
