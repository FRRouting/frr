!
hostname r1
!
interface lo
 ip address 10.255.255.1/32
!
interface r1-eth0
 ip address 10.0.12.1/24
!
interface r1-eth1
 ip address 10.0.13.1/24
!
ip route 10.255.255.4/32 10.0.12.2
ip route 10.255.255.5/32 10.0.13.3
!
router bgp 65001
 timers bgp 1 10
 bgp router-id 10.255.255.1
 no bgp ebgp-requires-policy
 neighbor 10.255.255.4 remote-as 65001
 neighbor 10.255.255.4 update-source lo
 neighbor 10.255.255.5 remote-as 65001
 neighbor 10.255.255.5 update-source lo
 !
 address-family ipv4 unicast
  neighbor 10.255.255.4 activate
  neighbor 10.255.255.5 activate
 exit-address-family
!
