hostname r4
!
interface lo
 ip address 10.255.0.4/32
!
interface r4-eth0
 ip address 10.0.4.2/24
!
interface r4-eth1
 ip address 10.0.5.1/24
!
ip forwarding
!
!
ip route 10.1.1.0/24 Null0
ip route 10.1.2.0/24 Null0
!
router bgp 65005
 bgp router-id 10.255.0.4
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp graceful-restart
 bgp graceful-restart restart-time 10
 bgp graceful-restart stalepath-time 60
 !
 neighbor 10.0.4.1 remote-as 65001
 neighbor 10.0.5.2 remote-as 65006
 !
 address-family ipv4 unicast
  ! R4 is a transit router - no aggregate, just relays routes from R5 to R1
  neighbor 10.0.4.1 activate
  neighbor 10.0.4.1 upa
  neighbor 10.0.4.1 send-community extended
  neighbor 10.0.5.2 activate
  neighbor 10.0.5.2 send-community extended
 exit-address-family
!
