hostname r5
!
interface r5-eth0
 ip address 10.0.5.2/24
!
!
ip route 10.1.1.0/24 Null0
ip route 10.1.2.0/24 Null0
!
router bgp 65006
 bgp router-id 10.255.0.5
 no bgp ebgp-requires-policy
 bgp graceful-restart
 bgp graceful-restart restart-time 10
 bgp graceful-restart stalepath-time 60
 neighbor 10.0.5.1 remote-as 65005
 !
 address-family ipv4 unicast
  neighbor 10.0.5.1 activate
  neighbor 10.0.5.1 send-community extended
  network 10.1.1.0/24
  network 10.1.2.0/24
 exit-address-family
!
