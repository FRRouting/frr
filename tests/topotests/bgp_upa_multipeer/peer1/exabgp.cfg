neighbor 10.0.0.1 {
    router-id 10.0.0.2;
    local-address 10.0.0.2;
    local-as 65002;
    peer-as 65001;

    family {
        ipv4 unicast;
    }

    static {
        # Send UPA for 10.1.1.0/24 with Router-ID 10.0.0.2, D-bit=0x80
        route 10.1.1.0/24 {
            next-hop 10.0.0.2;
            # UPA ExtCom: Type=0x03, Subtype=0x09, Flags=0x80 (D-bit), Router-ID=10.0.0.2
            extended-community [0x030980000a000002];
        }
    }
}
