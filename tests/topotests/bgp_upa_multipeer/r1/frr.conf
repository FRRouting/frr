hostname r1
! debug bgp updates
! debug bgp upa
!
!
interface lo
 ip address 10.255.0.1/32
!
interface r1-eth0
 ip address 10.0.2.1/24
!
interface r1-eth1
 ip address 10.0.3.1/24
!
interface r1-eth2
 ip address 10.0.4.1/24
!
ip forwarding
!
router bgp 65001
 bgp router-id 10.255.0.1
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp graceful-restart
 bgp graceful-restart restart-time 10
 bgp graceful-restart stalepath-time 60
 !
 neighbor 10.0.2.2 remote-as 65003
 !
 neighbor 10.0.3.2 remote-as 65004
 ! NO upa for r3 - should filter UPA
 !
 neighbor 10.0.4.2 remote-as 65005
 !
 address-family ipv4 unicast
  ! Aggregate with UPA enabled - summary-only prevents advertising specifics
  aggregate-address 10.1.0.0/16 summary-only upa drop max-routes 100
  !
  neighbor 10.0.2.2 activate
  neighbor 10.0.2.2 upa
  neighbor 10.0.2.2 send-community extended
  neighbor 10.0.3.2 activate
  neighbor 10.0.3.2 send-community extended
  neighbor 10.0.4.2 activate
  neighbor 10.0.4.2 upa
  neighbor 10.0.4.2 send-community extended
 exit-address-family
!
