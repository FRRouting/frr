!
! Zebra configuration for VRRP1 (master)
! Matching CL ssim topology
!
hostname vrrp1
!
debug zebra kernel
debug zebra events
debug zebra dplane
debug zebra rib detailed
!
! Physical interface for VRRP - like swp4 in CL (untagged VRRP)
interface vrrp1-eth0
 ip address 192.168.100.1/24
!
log stdout debugging
!
