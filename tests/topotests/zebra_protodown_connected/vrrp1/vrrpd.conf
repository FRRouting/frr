!
! VRRP configuration for vrrp1 (MASTER - priority 200)
! Matching CL ssim topology with VLAN subinterfaces
!
! VRRP on physical interface (like CL swp4 - untagged VRRP VRID 1)
interface vrrp1-eth0
 vrrp 1 version 3
 vrrp 1 priority 200
 vrrp 1 ip 192.168.100.254
!
! VRRP on VLAN subinterfaces (like CL swp5.101, swp5.102, swp5.103)
! These match the CL ssim test configuration
!
interface vrrp1-eth0.101
 vrrp 2 version 3
 vrrp 2 priority 200
 vrrp 2 ip 50.0.0.1
!
interface vrrp1-eth0.102
 vrrp 3 version 3
 vrrp 3 priority 200
 vrrp 3 ip 50.0.1.1
!
interface vrrp1-eth0.103
 vrrp 4 version 3
 vrrp 4 priority 200
 vrrp 4 ip 50.0.2.1
!
debug vrrp
log stdout debugging
