!
! OSPF configuration for vrrp2 (VRRP backup)
! Matching CL ssim configuration with redistribute connected
!
router ospf
 ospf router-id 192.168.100.2
 network 192.168.100.0/24 area 0.0.0.0
 network 50.0.0.0/24 area 0.0.0.0
 network 50.0.1.0/24 area 0.0.0.0
 network 50.0.2.0/24 area 0.0.0.0
 redistribute connected
 redistribute static
!
debug ospf events
debug ospf lsa
!
log stdout debugging
!
