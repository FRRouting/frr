!
! Zebra configuration for VRRP2 (backup)
! Matching CL ssim topology
!
hostname vrrp2
!
debug zebra kernel
debug zebra events
debug zebra dplane
debug zebra rib detailed
!
! Physical interface for VRRP - like swp4 in CL (untagged VRRP)
interface vrrp2-eth0
 ip address 192.168.100.2/24
!
! Note: In CL, VRRP is configured on VLAN sub-interfaces (swp5.101, etc.)
! The test will dynamically create VLAN sub-interfaces like:
!   vrrp2-eth0.101 with IP 50.0.0.3/24
!   vrrp2-eth0.102 with IP 50.0.1.3/24
!   vrrp2-eth0.103 with IP 50.0.2.3/24
! These mimic CL's swp5.101, swp5.102, swp5.103
!
log stdout debugging
!
