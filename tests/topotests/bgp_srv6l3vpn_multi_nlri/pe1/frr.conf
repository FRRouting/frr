frr defaults traditional
!
interface eth0
 ipv6 address 2001::1/64
!
interface eth1 vrf Vrf1
 ipv6 address fd01::1/64
!
segment-routing
 srv6
  locators
   locator loc1
    prefix fd00:201:201::/48
  !
 !
!
ip forwarding
ipv6 forwarding
!
ipv6 route fd00:202:202::/48 2001::2
!
router bgp 1
 bgp router-id 192.0.2.1
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 neighbor 2001::2 remote-as 2
 neighbor 2001::2 capability extended-nexthop
 !
 address-family ipv4 vpn
  neighbor 2001::2 activate
 exit-address-family
 !
 segment-routing srv6
  locator loc1
 !
!
router bgp 1 vrf Vrf1
 bgp router-id 192.0.2.1
 no bgp ebgp-requires-policy
 sid vpn per-vrf export auto
 neighbor fd01::2 remote-as 65001
 neighbor fd01::2 capability extended-nexthop
 !
 address-family ipv4 unicast
  nexthop vpn export 2001::1
  rd vpn export 1:1
  rt vpn both 1:1
  import vpn
  export vpn
  neighbor fd01::2 activate
 exit-address-family
!
