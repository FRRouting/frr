hostname rt4
!
! debug ospf sr
! debug ospf te
! debug ospf event
! debug ospf lsa
! debug ospf zebra
! debug zebra kernel
! debug zebra packet
! debug zebra mpls
!
interface lo
 ip address 4.4.4.4/32
 ip ospf area 0.0.0.0
 ip ospf passive
!
interface eth-rt2-1
 ip address 10.0.2.4/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt2-2
 ip address 10.0.3.4/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt5
 ip address 10.0.6.4/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt6
 ip address 10.0.7.4/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
router ospf
 ospf router-id 4.4.4.4
 !ospf opaque-lsa
 mpls-te on
 !mpls-te export
 mpls-te router-address 4.4.4.4
 router-info area
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing node-msd 8
 segment-routing prefix 4.4.4.4/32 index 40
!
