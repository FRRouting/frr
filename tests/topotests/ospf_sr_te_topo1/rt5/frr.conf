hostname rt5
!
! debug ospf sr
! debug ospf te
! debug ospf event
! debug ospf lsa
! debug ospf zebra
! debug zebra kernel
! debug zebra packet
! debug zebra mpls
!
interface lo
 ip address 5.5.5.5/32
 ip ospf area 0.0.0.0
 ip ospf passive
!
interface eth-rt3-1
 ip address 10.0.4.5/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt3-2
 ip address 10.0.5.5/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt4
 ip address 10.0.6.5/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt6
 ip address 10.0.8.5/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
router ospf
 ospf router-id 5.5.5.5
! ospf opaque-lsa
 mpls-te on
! mpls-te export
 mpls-te router-address 5.5.5.5
 router-info area
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing node-msd 8
 segment-routing prefix 5.5.5.5/32 index 50
!
