hostname rt3
!
! debug ospf sr
! debug ospf te
! debug ospf event
! debug ospf lsa
! debug ospf zebra
! debug zebra kernel
! debug zebra packet
! debug zebra mpls
!
interface lo
 ip address 3.3.3.3/32
 ip ospf area 0.0.0.0
!
interface eth-sw1
 ip address 10.0.1.3/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt5-1
 ip address 10.0.4.3/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
interface eth-rt5-2
 ip address 10.0.5.3/24
 ip ospf network point-to-point
 ip ospf hello-interval 2
 ip ospf dead-interval 10
 ip ospf area 0.0.0.0
 link-params
  enable
  exit-link-params
!
router ospf
 ospf router-id 3.3.3.3
 !ospf opaque-lsa
 mpls-te on
 !mpls-te export
 mpls-te router-address 3.3.3.3
 router-info area
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing node-msd 8
 segment-routing prefix 3.3.3.3/32 index 30
!
